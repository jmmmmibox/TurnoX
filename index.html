// MI CALENDARIO (empleado)
// =====================================================================
function renderMiCalendario() {
  const emp = state.user.empleadoData || state.empleados.find(e => e.id === state.user.id);
  if (!emp) return;

  const year = state.calYear;
  const mes = state.calMes;
  const diasMes = new Date(year, mes + 1, 0).getDate();
  const nombresMes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const letra = getLetra(emp.letra_id);
  const dayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  let html = '<div class="cal-controls"><div class="cal-nav">';
  html += '<button class="cal-nav-btn" onclick="calPrev();renderMiCalendario()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>';
  html += '<span class="cal-month-label">' + nombresMes[mes] + ' ' + year + '</span>';
  html += '<button class="cal-nav-btn" onclick="calNext();renderMiCalendario()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>';
  html += '</div></div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">' + emp.nombre + ' ' + emp.apellidos + ' — Letra ' + (letra ? letra.nombre : '?') + '</span></div>';
  html += '<div style="padding:16px"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">';
  ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(d => {
    html += '<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:4px">' + d + '</div>';
  });

  const firstDay = new Date(year, mes, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  for (let i = 0; i < offset; i++) html += '<div></div>';

  for (let i = 1; i <= diasMes; i++) {
    const d = new Date(year, mes, i);
    const ds = year + '-' + String(mes + 1).padStart(2, '0') + '-' + String(i).padStart(2, '0');
    const pt = calcTurno(emp, ds);
    const isToday = ds === todayStr();
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const isFestivo = state.festivos.some(f => f.fecha === ds);

    html += '<div style="border-radius:8px;border:1px solid ' + (isToday ? 'var(--primary-light)' : isFestivo ? '#FDE68A' : 'var(--border)') + ';background:' + (isToday ? '#EFF6FF' : isFestivo ? '#FFFBEB' : 'white') + ';padding:6px;text-align:center;min-height:52px">';
    html += '<div style="font-size:10px;color:' + (isWeekend ? 'var(--danger)' : 'var(--text3)') + ';font-weight:600">' + dayNames[d.getDay()] + '</div>';
    html += '<div style="font-size:14px;font-weight:700;color:' + (isToday ? 'var(--primary-light)' : 'var(--text)') + '">' + i + '</div>';
    html += '<span class="turno-badge ' + (pt || 'D') + '" style="margin-top:2px">' + (pt || 'D') + '</span></div>';
  }

  html += '</div>';
  html += '<div class="legend-row">';
  [['M','Mañana'],['T','Tarde'],['N','Noche'],['D','Descanso'],['R','Refuerzo']].forEach(([k, v]) => {
    html += '<div class="legend-item"><span class="turno-badge ' + k + '">' + k + '</span> ' + v + '</div>';
  });
  html += '</div></div></div>';

  document.getElementById('page-mi-calendario').innerHTML = html;
}

// =====================================================================
// MIS SOLICITUDES (empleado)
// =====================================================================
// =====================================================================
// MIS SOLICITUDES (empleado)
// =====================================================================
async function renderMisSolicitudes() {
  var emp = state.user.empleadoData || state.empleados.find(function(e) { return e.id === state.user.id; });
  if (!emp) { document.getElementById('page-mis-solicitudes').innerHTML = '<div class="empty-state"><p>Cargando...</p></div>'; return; }

  var vacSol = [], intercambios = [], configLetras = [], todasSolicitudes = [];
  try { vacSol = await sbQuery('vacaciones_solicitudes', { select: '*', filters: ['empleado_id=eq.' + state.user.id], order: 'created_at.desc' }); } catch (e) {}
  try { intercambios = await sbQuery('intercambios', { select: '*', order: 'created_at.desc', limit: 20 }); intercambios = intercambios.filter(function(ic) { return ic.solicitante_id === state.user.id || ic.receptor_id === state.user.id; }); } catch (e) {}
  try { configLetras = await sbQuery('vacaciones_config_letra', { select: '*', order: 'orden.asc' }); } catch (e) {}
  try { todasSolicitudes = await sbQuery('vacaciones_solicitudes', { select: '*' }); } catch (e) {}

  var rondas = [];
  try { rondas = await sbQuery('vacaciones_rondas', { select: '*', filters: ['planta_id=eq.' + PLANTA_ID], order: 'numero_ronda.asc' }); } catch (e) {}

  var hoy = todayStr();
  var miLetraId = emp.letra_id;
  var miAreaId = emp.area_principal_id;

  // Buscar si tiene alguna ronda activa para su letra
  var rondaActiva = null;
  var configActiva = null;
  for (var i = 0; i < rondas.length; i++) {
    if (!rondas[i].abierta) continue;
    var cl = configLetras.find(function(c) { return c.ronda_id === rondas[i].id && c.letra_id === miLetraId && c.fecha_desde <= hoy && c.fecha_hasta >= hoy; });
    if (cl) { rondaActiva = rondas[i]; configActiva = cl; break; }
  }

  var html = '';

  // === SOLICITAR VACACIONES ===
  html += '<div class="card mb-4"><div class="card-header"><span class="card-title">Solicitar Vacaciones</span></div><div class="card-body">';
  if (rondaActiva && configActiva) {
    html += '<div class="alert alert-success" style="margin-bottom:16px"><span><strong>Ronda ' + rondaActiva.numero_ronda + ' — ' + rondaActiva.nombre + '</strong> activa para tu letra. Puedes solicitar hasta el ' + formatDateES(configActiva.fecha_hasta) + '. ' + rondaActiva.dias + ' días ' + (rondaActiva.numero_ronda <= 2 ? 'consecutivos' : 'sueltos') + '.</span></div>';

    // Calendario anual de mi área — mostrar vacaciones ya pedidas por otros de mi área
    var vacsMiArea = todasSolicitudes.filter(function(s) {
      if (s.estado === 'rechazada') return false;
      if (s.ronda_id !== rondaActiva.id) return false;
      var empS = state.empleados.find(function(e) { return e.id === s.empleado_id; });
      return empS && empS.area_principal_id === miAreaId && s.empleado_id !== emp.id;
    });

    // Generar días bloqueados (vacaciones de otros + 2 días buffer)
    var diasBloqueados = {};
    vacsMiArea.forEach(function(s) {
      var d = new Date(s.fecha_inicio + 'T12:00:00');
      var fin = new Date(s.fecha_fin + 'T12:00:00');
      // 2 días antes
      var bufferAntes = new Date(d); bufferAntes.setDate(bufferAntes.getDate() - 2);
      // 2 días después
      var bufferDespues = new Date(fin); bufferDespues.setDate(bufferDespues.getDate() + 2);

      var cur = new Date(bufferAntes);
      while (cur <= bufferDespues) {
        var ds = cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0') + '-' + String(cur.getDate()).padStart(2, '0');
        if (cur >= d && cur <= fin) {
          diasBloqueados[ds] = 'ocupado'; // vacaciones de otro
        } else {
          if (!diasBloqueados[ds]) diasBloqueados[ds] = 'buffer'; // buffer 2 días
        }
        cur.setDate(cur.getDate() + 1);
      }
    });

    // Validar max 2 fines de semana por mes y área
    var fdsOcupadosPorMes = {};
    vacsMiArea.forEach(function(s) {
      var d = new Date(s.fecha_inicio + 'T12:00:00');
      var fin = new Date(s.fecha_fin + 'T12:00:00');
      while (d <= fin) {
        if (d.getDay() === 0 || d.getDay() === 6) {
          var mesKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          if (!fdsOcupadosPorMes[mesKey]) fdsOcupadosPorMes[mesKey] = new Set();
          // Identificar el fin de semana por la semana ISO
          var weekNum = Math.ceil(d.getDate() / 7);
          fdsOcupadosPorMes[mesKey].add(weekNum);
        }
        d.setDate(d.getDate() + 1);
      }
    });

    var miSolicitudActual = vacSol.find(function(s) { return s.ronda_id === rondaActiva.id && s.estado !== 'rechazada'; });

    if (miSolicitudActual) {
      html += '<div class="alert alert-info"><span>Ya has solicitado vacaciones para esta ronda: <strong>' + formatDateES(miSolicitudActual.fecha_inicio) + ' – ' + formatDateES(miSolicitudActual.fecha_fin) + '</strong> (' + miSolicitudActual.dias_solicitados + ' días) — ' + miSolicitudActual.estado + '</span></div>';
    }

    // Calendario visual tipo calendario oficial pero solo mi área
    if (!state.vacCalMes) state.vacCalMes = new Date().getMonth();
    if (!state.vacCalYear) state.vacCalYear = new Date().getFullYear();
    var vcMes = state.vacCalMes;
    var vcYear = state.vacCalYear;
    var vcDiasMes = new Date(vcYear, vcMes + 1, 0).getDate();
    var vcNombresMes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    // Empleados de mi área ordenados por letra
    var empsArea = state.empleados.filter(function(e) { return e.area_principal_id === miAreaId; }).sort(function(a, b) {
      var la = getLetra(a.letra_id); var lb = getLetra(b.letra_id);
      return (la ? la.nombre : 'Z').localeCompare(lb ? lb.nombre : 'Z');
    });

    var dayNames = ['D','L','M','X','J','V','S'];
    var vcDias = [];
    for (var vd = 1; vd <= vcDiasMes; vd++) {
      var vdd = new Date(vcYear, vcMes, vd);
      var vds = vcYear + '-' + String(vcMes + 1).padStart(2, '0') + '-' + String(vd).padStart(2, '0');
      vcDias.push({
        num: vd, ds: vds,
        isWeekend: vdd.getDay() === 0 || vdd.getDay() === 6,
        isFestivo: state.festivos.some(function(f) { return f.fecha === vds; }),
        dayName: dayNames[vdd.getDay()]
      });
    }

    html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">';
    html += '<button class="cal-nav-btn" onclick="state.vacCalMes--;if(state.vacCalMes<0){state.vacCalMes=11;state.vacCalYear--;}renderMisSolicitudes()"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"15 18 9 12 15 6\"/></svg></button>';
    html += '<span class="cal-month-label">' + vcNombresMes[vcMes] + ' ' + vcYear + '</span>';
    html += '<button class="cal-nav-btn" onclick="state.vacCalMes++;if(state.vacCalMes>11){state.vacCalMes=0;state.vacCalYear++;}renderMisSolicitudes()"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"9 18 15 12 9 6\"/></svg></button>';
    html += '<span style="font-size:12px;color:var(--text2);margin-left:8px">' + (getArea(miAreaId) ? getArea(miAreaId).nombre : '') + '</span>';
    html += '</div>';

    // Leyenda
    html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;font-size:11px">';
    html += '<span><span class=\"turno-badge M\" style=\"width:18px;height:18px;font-size:9px\">M</span> Mañana</span>';
    html += '<span><span class=\"turno-badge T\" style=\"width:18px;height:18px;font-size:9px\">T</span> Tarde</span>';
    html += '<span><span class=\"turno-badge N\" style=\"width:18px;height:18px;font-size:9px\">N</span> Noche</span>';
    html += '<span><span class=\"turno-badge D\" style=\"width:18px;height:18px;font-size:9px\">D</span> Descanso</span>';
    html += '<span><span class=\"turno-badge R\" style=\"width:18px;height:18px;font-size:9px\">R</span> Refuerzo</span>';
    html += '<span><span class=\"turno-badge V\" style=\"width:18px;height:18px;font-size:9px\">V</span> Vacaciones</span>';
    html += '</div>';

    // Tabla estilo calendario oficial
    html += '<div class="cal-table-wrap"><table class="cal-table"><thead><tr>';
    html += '<th style=\"text-align:left;padding:8px 12px;min-width:150px;position:sticky;left:0;background:white;z-index:10\">Empleado</th>';
    vcDias.forEach(function(d) {
      var bloq = diasBloqueados[d.ds];
      var thClass = 'day-header' + (d.isWeekend ? ' weekend' : '') + (d.isFestivo ? ' festivo' : '');
      var thStyle = '';
      if (bloq === 'ocupado') thStyle = 'background:#FCE7F3;';
      else if (bloq === 'buffer') thStyle = 'background:#FEF9C3;';
      html += '<th class=\"' + thClass + '\" style=\"' + thStyle + '\">';
      html += '<div>' + d.dayName + '</div><div>' + d.num + '</div></th>';
    });
    html += '</tr></thead><tbody>';

    empsArea.forEach(function(empA) {
      var letrA = getLetra(empA.letra_id);
      var esYo = empA.id === emp.id;
      html += '<tr style=\"' + (esYo ? 'background:#EFF6FF;' : '') + '\">';
      html += '<td class=\"emp-info\" style=\"' + (esYo ? 'background:#EFF6FF;font-weight:700;' : '') + '\">';
      html += '<div class=\"emp-cell-name\">' + (esYo ? '→ ' : '') + empA.nombre + ' ' + empA.apellidos + '</div>';
      html += '<div class=\"emp-cell-sub\"><span style=\"color:' + (letrA ? letrA.color : '#999') + '\">' + (letrA ? letrA.nombre : '?') + '</span></div></td>';
      vcDias.forEach(function(d) {
        var t = calcTurno(empA, d.ds);
        var tdStyle = '';
        var isSelected = esYo && state.vacDiasSeleccionados && state.vacDiasSeleccionados.includes(d.ds);
        var isBloqueado = diasBloqueados[d.ds] === 'ocupado' || (!esYo && t === 'V');
        var isBuffer = !esYo && diasBloqueados[d.ds] === 'buffer';
        if (isSelected) tdStyle = 'background:#DCFCE7;border:2px solid #16A34A;';
        else if (esYo && d.ds === todayStr()) tdStyle = 'background:#DBEAFE;';
        else if (isBloqueado) tdStyle = 'background:#FCE7F3;';
        else if (isBuffer) tdStyle = 'background:#FFFBEB;';
        var clickable = esYo && !miSolicitudActual && !isBloqueado && !isBuffer;
        html += '<td style="' + tdStyle + (clickable ? 'cursor:pointer;' : '') + '"' + (clickable ? ' onclick="toggleVacDia(\'' + d.ds + '\')"' : '') + '><span class="turno-cell ' + (isSelected ? 'V' : (t || 'empty')) + '">' + (isSelected ? 'V' : (t || '\xb7')) + '</span></td>';
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';

    // Panel de seleccion
    if (!miSolicitudActual) {
      var selDias = state.vacDiasSeleccionados || [];
      html += '<div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:8px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      html += '<div style="font-size:13px;font-weight:600">Selecciona ' + rondaActiva.dias + ' dias ' + (rondaActiva.numero_ronda <= 2 ? 'consecutivos' : 'sueltos') + ' en tu fila</div>';
      html += '<button class="btn btn-sm btn-ghost" onclick="state.vacDiasSeleccionados=[];renderMisSolicitudes()">Limpiar</button></div>';
      if (selDias.length > 0) {
        selDias.sort();
        html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
        selDias.forEach(function(ds) { html += '<span style="font-size:11px;background:#DCFCE7;color:#166534;padding:3px 8px;border-radius:4px;font-weight:600">' + formatDateES(ds) + '</span>'; });
        html += '</div>';
        html += '<div style="font-size:12px;color:var(--text2);margin-bottom:10px">' + selDias.length + ' de ' + rondaActiva.dias + ' dias seleccionados</div>';
      } else {
        html += '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Haz clic en los dias de tu fila (marcada con \u2192) para seleccionarlos</div>';
      }
      if (selDias.length === rondaActiva.dias) {
        html += '<button class="btn btn-blue" onclick="enviarVacDesdeCalendario(\'' + rondaActiva.id + '\',' + rondaActiva.dias + ',' + rondaActiva.numero_ronda + ')">Confirmar solicitud</button>';
      } else if (selDias.length > rondaActiva.dias) {
        html += '<div class="alert alert-danger" style="margin:0"><span>Has seleccionado mas dias de los permitidos (' + rondaActiva.dias + ')</span></div>';
      }
      html += '</div>';
    }


    // Mostrar vacaciones ya pedidas en esta área
    if (vacsMiArea.length > 0) {
      html += '<div style="margin-top:16px;font-size:12px;font-weight:600;color:var(--text2)">Vacaciones ya asignadas en tu área:</div>';
      vacsMiArea.forEach(function(s) {
        var empS = state.empleados.find(function(e) { return e.id === s.empleado_id; });
        var letrS = empS ? getLetra(empS.letra_id) : null;
        html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">';
        html += '<span class="turno-badge V">V</span>';
        html += '<span style="font-size:12px;font-weight:600">' + (empS ? empS.nombre + ' ' + empS.apellidos : '?') + '</span>';
        html += '<span class="letra-badge" style="background:' + (letrS ? letrS.color + '22' : '#eee') + ';color:' + (letrS ? letrS.color : '#999') + '">' + (letrS ? letrS.nombre : '?') + '</span>';
        html += '<span style="font-size:12px;color:var(--text2)">' + formatDateES(s.fecha_inicio) + ' – ' + formatDateES(s.fecha_fin) + '</span>';
        html += '</div>';
      });
    }

  } else {
    // No tiene ronda activa
    var proxConfig = null;
    for (var j = 0; j < rondas.length; j++) {
      if (!rondas[j].abierta) continue;
      var clFutura = configLetras.find(function(c) { return c.ronda_id === rondas[j].id && c.letra_id === miLetraId && c.fecha_desde > hoy; });
      if (clFutura) { proxConfig = { ronda: rondas[j], config: clFutura }; break; }
    }
    if (proxConfig) {
      html += '<div class="alert alert-warning"><span>No es tu turno para solicitar vacaciones. Tu letra podrá solicitar a partir del <strong>' + formatDateES(proxConfig.config.fecha_desde) + '</strong> en la ' + proxConfig.ronda.nombre + '.</span></div>';
    } else {
      html += '<div class="alert alert-info"><span>No hay rondas de vacaciones abiertas para tu letra en este momento.</span></div>';
    }
  }
  html += '</div></div>';

  // === MIS SOLICITUDES ===
  html += '<div class="grid-2"><div>';
  html += '<div class="card"><div class="card-header"><span class="card-title">Mis vacaciones</span></div><div class="card-body">';
  if (vacSol.length === 0) html += '<div class="empty-state"><p>Sin solicitudes</p></div>';
  vacSol.forEach(function(s) {
    var ronda = rondas.find(function(r) { return r.id === s.ronda_id; });
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">';
    html += '<div><div style="font-size:13px;font-weight:600">' + formatDateES(s.fecha_inicio) + ' – ' + formatDateES(s.fecha_fin) + '</div>';
    html += '<div style="font-size:11px;color:var(--text2)">' + (ronda ? ronda.nombre : '') + ' · ' + s.dias_solicitados + ' días</div></div>';
    html += '<span class="status-badge ' + s.estado + '">' + s.estado + '</span></div>';
  });
  html += '</div></div></div>';

  // === MIS INTERCAMBIOS ===
  html += '<div><div class="card"><div class="card-header"><span class="card-title">Mis intercambios</span>';
  html += '<button class="btn btn-sm btn-blue" onclick="modalNuevoIntercambio()">+ Proponer</button></div><div class="card-body">';
  if (intercambios.length === 0) html += '<div class="empty-state"><p>Sin intercambios</p></div>';
  intercambios.forEach(function(ic) {
    var esSolicitante = ic.solicitante_id === state.user.id;
    var otro = state.empleados.find(function(e) { return e.id === (esSolicitante ? ic.receptor_id : ic.solicitante_id); });
    var areaSol = ic.area_solicitante_id ? getArea(ic.area_solicitante_id) : null;
    var areaRec = ic.area_receptor_id ? getArea(ic.area_receptor_id) : null;

    html += '<div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:start">';
    html += '<div><div style="font-size:13px;font-weight:600">Con ' + (otro ? otro.nombre + ' ' + otro.apellidos : '?') + '</div>';
    html += '<div style="font-size:11px;color:var(--text2)">' + formatDateES(ic.fecha_solicitante) + ' · ' + (ic.turno_solicitante || '') + ' → ' + (ic.turno_receptor || '') + '</div>';
    if (areaSol && areaRec) html += '<div style="font-size:11px;color:var(--text3)">Áreas: ' + areaSol.nombre + ' ⇄ ' + areaRec.nombre + '</div>';
    html += '</div>';
    html += '<span class="status-badge ' + ic.estado + '">' + ic.estado + '</span></div>';

    // Si soy receptor y está pendiente, puedo aceptar
    if (!esSolicitante && ic.estado === 'pendiente') {
      html += '<div style="display:flex;gap:6px;margin-top:8px">';
      html += '<button class="btn btn-sm btn-green" onclick="aceptarIntercambio(\'' + ic.id + '\')">Aceptar</button>';
      html += '<button class="btn btn-sm btn-red" onclick="rechazarIntercambioEmp(\'' + ic.id + '\')">Rechazar</button>';
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div></div></div></div>';

  document.getElementById('page-mis-solicitudes').innerHTML = html;
}

async function enviarSolicitudVacaciones(rondaId, diasRonda, numRonda) {
  var inicio = document.getElementById('sv-inicio').value;
  var fin = document.getElementById('sv-fin').value;
  if (!inicio || !fin) { showToast('Indica las fechas', 'error'); return; }

  var dias = Math.round((new Date(fin + 'T12:00:00') - new Date(inicio + 'T12:00:00')) / 86400000) + 1;

  // Validar días consecutivos para rondas 1 y 2
  if (numRonda <= 2 && dias !== diasRonda) {
    showToast('Debes solicitar exactamente ' + diasRonda + ' días consecutivos. Has seleccionado ' + dias, 'error');
    return;
  }
  // Validar días sueltos ronda 3
  if (numRonda === 3 && dias > diasRonda) {
    showToast('Máximo ' + diasRonda + ' días para esta ronda', 'error');
    return;
  }

  // Validar no coincidencia con misma área + buffer 2 días
  var emp = state.user.empleadoData || state.empleados.find(function(e) { return e.id === state.user.id; });
  var todasSols = [];
  try { todasSols = await sbQuery('vacaciones_solicitudes', { select: '*', filters: ['ronda_id=eq.' + rondaId] }); } catch(e) {}

  var conflicto = false;
  todasSols.forEach(function(s) {
    if (s.estado === 'rechazada') return;
    if (s.empleado_id === emp.id) return;
    var empS = state.empleados.find(function(e) { return e.id === s.empleado_id; });
    if (!empS || empS.area_principal_id !== emp.area_principal_id) return;

    // Check overlap con buffer 2 días
    var sInicio = new Date(s.fecha_inicio + 'T12:00:00');
    var sFin = new Date(s.fecha_fin + 'T12:00:00');
    sInicio.setDate(sInicio.getDate() - 2);
    sFin.setDate(sFin.getDate() + 2);

    var miInicio = new Date(inicio + 'T12:00:00');
    var miFin = new Date(fin + 'T12:00:00');

    if (miInicio <= sFin && miFin >= sInicio) conflicto = true;
  });

  if (conflicto) {
    showToast('Conflicto: otro empleado de tu área ya tiene vacaciones en esas fechas (o dentro del margen de 2 días)', 'error');
    return;
  }

  // Validar max 2 fines de semana por mes y área
  var d = new Date(inicio + 'T12:00:00');
  var finDate = new Date(fin + 'T12:00:00');
  var misFds = {};
  while (d <= finDate) {
    if (d.getDay() === 0 || d.getDay() === 6) {
      var mesKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      if (!misFds[mesKey]) misFds[mesKey] = new Set();
      misFds[mesKey].add(Math.ceil(d.getDate() / 7));
    }
    d.setDate(d.getDate() + 1);
  }
  // Contar fds existentes por mes en la misma área
  var fdsError = false;
  Object.keys(misFds).forEach(function(mesKey) {
    var fdsExistentes = new Set();
    todasSols.forEach(function(s) {
      if (s.estado === 'rechazada') return;
      var empS = state.empleados.find(function(e) { return e.id === s.empleado_id; });
      if (!empS || empS.area_principal_id !== emp.area_principal_id) return;
      var dd = new Date(s.fecha_inicio + 'T12:00:00');
      var ff = new Date(s.fecha_fin + 'T12:00:00');
      while (dd <= ff) {
        var mk = dd.getFullYear() + '-' + String(dd.getMonth() + 1).padStart(2, '0');
        if (mk === mesKey && (dd.getDay() === 0 || dd.getDay() === 6)) {
          fdsExistentes.add(Math.ceil(dd.getDate() / 7));
        }
        dd.setDate(dd.getDate() + 1);
      }
    });
    var totalFds = new Set([...fdsExistentes, ...misFds[mesKey]]);
    if (totalFds.size > 2) fdsError = true;
  });

  if (fdsError) {
    showToast('Máximo 2 fines de semana por mes y área. Este mes ya hay 2 ocupados.', 'error');
    return;
  }

  try {
    await sbInsert('vacaciones_solicitudes', {
      empleado_id: emp.id,
      ronda_id: rondaId,
      fecha_inicio: inicio,
      fecha_fin: fin,
      dias_solicitados: dias,
      estado: 'pendiente',
    });
    showToast('Solicitud enviada', 'success');
    renderMisSolicitudes();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function enviarVacDesdeCalendario(rondaId, diasRonda, numRonda) {
  var selDias = (state.vacDiasSeleccionados || []).sort();
  if (selDias.length !== diasRonda) { showToast('Selecciona exactamente ' + diasRonda + ' días', 'error'); return; }

  // Validar consecutivos para rondas 1 y 2
  if (numRonda <= 2) {
    for (var i = 1; i < selDias.length; i++) {
      var prev = new Date(selDias[i-1] + 'T12:00:00');
      var curr = new Date(selDias[i] + 'T12:00:00');
      var diff = Math.round((curr - prev) / 86400000);
      if (diff !== 1) { showToast('Los días deben ser consecutivos para esta ronda', 'error'); return; }
    }
  }

  var inicio = selDias[0];
  var fin = selDias[selDias.length - 1];
  var emp = state.user.empleadoData || state.empleados.find(function(e) { return e.id === state.user.id; });

  // Validaciones: no coincidencia con misma área + buffer 2 días
  var todasSols = [];
  try { todasSols = await sbQuery('vacaciones_solicitudes', { select: '*', filters: ['ronda_id=eq.' + rondaId] }); } catch(e) {}

  var conflicto = false;
  todasSols.forEach(function(s) {
    if (s.estado === 'rechazada' || s.empleado_id === emp.id) return;
    var empS = state.empleados.find(function(e) { return e.id === s.empleado_id; });
    if (!empS || empS.area_principal_id !== emp.area_principal_id) return;
    var sInicio = new Date(s.fecha_inicio + 'T12:00:00');
    var sFin = new Date(s.fecha_fin + 'T12:00:00');
    sInicio.setDate(sInicio.getDate() - 2);
    sFin.setDate(sFin.getDate() + 2);
    selDias.forEach(function(ds) {
      var dd = new Date(ds + 'T12:00:00');
      if (dd >= sInicio && dd <= sFin) conflicto = true;
    });
  });
  if (conflicto) { showToast('Conflicto: otro empleado de tu área tiene vacaciones en esas fechas o dentro del margen de 2 días', 'error'); return; }

  // Validar max 2 fds por mes y área
  var fdsPorMes = {};
  selDias.forEach(function(ds) {
    var dd = new Date(ds + 'T12:00:00');
    if (dd.getDay() === 0 || dd.getDay() === 6) {
      var mk = dd.getFullYear() + '-' + String(dd.getMonth() + 1).padStart(2, '0');
      if (!fdsPorMes[mk]) fdsPorMes[mk] = new Set();
      fdsPorMes[mk].add(Math.ceil(dd.getDate() / 7));
    }
  });
  var fdsError = false;
  Object.keys(fdsPorMes).forEach(function(mk) {
    var existentes = new Set();
    todasSols.forEach(function(s) {
      if (s.estado === 'rechazada') return;
      var empS = state.empleados.find(function(e) { return e.id === s.empleado_id; });
      if (!empS || empS.area_principal_id !== emp.area_principal_id) return;
      var dd = new Date(s.fecha_inicio + 'T12:00:00');
      var ff = new Date(s.fecha_fin + 'T12:00:00');
      while (dd <= ff) {
        var m2 = dd.getFullYear() + '-' + String(dd.getMonth() + 1).padStart(2, '0');
        if (m2 === mk && (dd.getDay() === 0 || dd.getDay() === 6)) existentes.add(Math.ceil(dd.getDate() / 7));
        dd.setDate(dd.getDate() + 1);
      }
    });
    var total = new Set([...existentes, ...fdsPorMes[mk]]);
    if (total.size > 2) fdsError = true;
  });
  if (fdsError) { showToast('Máximo 2 fines de semana por mes y área', 'error'); return; }

  try {
    await sbInsert('vacaciones_solicitudes', {
      empleado_id: emp.id,
      ronda_id: rondaId,
      fecha_inicio: inicio,
      fecha_fin: fin,
      dias_solicitados: selDias.length,
      estado: 'pendiente',
    });
    state.vacDiasSeleccionados = [];
    showToast('Solicitud enviada', 'success');
    renderMisSolicitudes();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function guardarSolicitudEdit(solId, empId) {
  var nuevoEstado = document.getElementById('es-estado').value;
  var inicio = document.getElementById('es-inicio').value;
  var fin = document.getElementById('es-fin').value;
  var dias = Math.round((new Date(fin + 'T12:00:00') - new Date(inicio + 'T12:00:00')) / 86400000) + 1;
  try {
    await sbUpdate('vacaciones_solicitudes', solId, {
      fecha_inicio: inicio, fecha_fin: fin, dias_solicitados: dias,
      estado: nuevoEstado, notas_gestor: document.getElementById('es-notas').value
    });
    // Si se aprueba, crear turnos V
    if (nuevoEstado === 'aprobada') {
      var d = new Date(inicio + 'T12:00:00');
      var finD = new Date(fin + 'T12:00:00');
      while (d <= finD) {
        var ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        try {
          var ex = await sbQuery('turnos', { select: '*', filters: ['empleado_id=eq.' + empId, 'fecha=eq.' + ds] });
          if (ex && ex.length > 0) await sbUpdate('turnos', ex[0].id, { tipo: 'V', editado_manualmente: true });
          else await sbInsert('turnos', { empleado_id: empId, fecha: ds, tipo: 'V', editado_manualmente: true });
        } catch(e2) {}
        d.setDate(d.getDate() + 1);
      }
      try { state.turnosEditados = await sbQuery('turnos', { select: '*', filters: ['editado_manualmente=eq.true'] }); } catch(e3) {}
    }
    closeModal();
    showToast('Solicitud actualizada', 'success');
    renderVacaciones();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function eliminarSolicitud(solId) {
  if (!confirm('¿Eliminar esta solicitud? Si estaba aprobada, los turnos V del calendario no se eliminan automáticamente.')) return;
  try {
    await sbDelete('vacaciones_solicitudes', solId);
    closeModal();
    showToast('Solicitud eliminada', 'success');
    renderVacaciones();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function openModal(title, body, footer) {

async function crearAusencia() {
  var inicio = document.getElementById('na-inicio').value;
  var fin = document.getElementById('na-fin').value;
  var empId = document.getElementById('na-emp').value;
  var tipo = document.getElementById('na-tipo').value;
  if (!inicio || !fin) { showToast('Indica las fechas', 'error'); return; }
  try {
    await sbInsert('ausencias', {
      empleado_id: empId, tipo: tipo, fecha_inicio: inicio, fecha_fin: fin,
      cobertura_tipo: document.getElementById('na-cob').value,
      motivo: document.getElementById('na-notas').value,
      modo_12h: document.getElementById('na-cob').value === 'Modo 12 horas',
    });
    // Crear turnos B/L en el calendario
    var turnoTipo = 'B'; // todas las ausencias usan B en calendario
    var d = new Date(inicio + 'T12:00:00');
    var finD = new Date(fin + 'T12:00:00');
    while (d <= finD) {
      var ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      try {
        var ex = await sbQuery('turnos', { select: '*', filters: ['empleado_id=eq.' + empId, 'fecha=eq.' + ds] });
        if (ex && ex.length > 0) await sbUpdate('turnos', ex[0].id, { tipo: turnoTipo, editado_manualmente: true, notas: tipo });
        else await sbInsert('turnos', { empleado_id: empId, fecha: ds, tipo: turnoTipo, editado_manualmente: true, notas: tipo });
      } catch(e2) {}
      d.setDate(d.getDate() + 1);
    }
    try { state.turnosEditados = await sbQuery('turnos', { select: '*', filters: ['editado_manualmente=eq.true'] }); } catch(e3) {}
    closeModal();
    renderAusencias();
    showToast('Ausencia registrada y reflejada en calendario', 'success');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function guardarTurnoEdit(empId, fecha, nuevoTurno) {
  try {
    const existentes = await sbQuery('turnos', { select: '*', filters: ['empleado_id=eq.' + empId, 'fecha=eq.' + fecha] });
    if (existentes && existentes.length > 0) {
      await sbUpdate('turnos', existentes[0].id, { tipo: nuevoTurno, editado_manualmente: true });
    } else {
      await sbInsert('turnos', { empleado_id: empId, fecha: fecha, tipo: nuevoTurno, editado_manualmente: true });
    }
    // Actualizar state local
    const idx = state.turnosEditados.findIndex(t => t.empleado_id === empId && t.fecha === fecha);
    if (idx >= 0) { state.turnosEditados[idx].tipo = nuevoTurno; }
    else { state.turnosEditados.push({ empleado_id: empId, fecha: fecha, tipo: nuevoTurno, editado_manualmente: true }); }
    closeModal();
    showToast('Turno actualizado', 'success');

}

async function guardarEmpleado(empId) {
  var passEl = document.getElementById('ee-pass');
  var data = {
    nombre: document.getElementById('ee-nombre').value.trim(),
    apellidos: document.getElementById('ee-apellidos').value.trim(),
    username: document.getElementById('ee-user').value.trim(),
    letra_id: document.getElementById('ee-letra').value,
    area_principal_id: document.getElementById('ee-area').value,
    telefono: document.getElementById('ee-tel').value.trim() || null,
    notas: document.getElementById('ee-notas').value.trim() || null,
  };
  if (passEl && passEl.value && passEl.value.trim().length > 0) {
    data.password_hash = passEl.value.trim();
  }
  if (!data.nombre || !data.apellidos || !data.username) { showToast('Campos obligatorios', 'error'); return; }

  try {
    await sbUpdate('empleados', empId, data);

    // Actualizar polivalencias: borrar las existentes y crear las nuevas
    const oldPolivs = state.polivalencias.filter(p => p.empleado_id === empId);
    for (const p of oldPolivs) { await sbDelete('polivalencias', p.id); }

    const checkboxes = document.querySelectorAll('.ee-poliv:checked');
    for (const cb of checkboxes) {
      if (cb.value !== data.area_principal_id) {
        await sbInsert('polivalencias', { empleado_id: empId, area_id: cb.value });
      }
    }

    // Recargar datos
    state.empleados = await sbQuery('empleados', { select: '*', filters: ['planta_id=eq.' + PLANTA_ID, 'activo=eq.true'], order: 'nombre.asc' });
    state.polivalencias = await sbQuery('polivalencias', { select: '*' });
    closeModal();
    renderEmpleados();
    showToast('Empleado actualizado', 'success');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function desactivarEmpleado(empId) {

async function moverArea(areaId, direction) {
  const sorted = [...state.areas].sort((a, b) => a.orden - b.orden);
  const idx = sorted.findIndex(a => a.id === areaId);
  const swapIdx = idx + direction;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;

  const thisArea = sorted[idx];
  const otherArea = sorted[swapIdx];
  const tempOrden = thisArea.orden;

  try {
    await sbUpdate('areas', thisArea.id, { orden: otherArea.orden });
    await sbUpdate('areas', otherArea.id, { orden: tempOrden });
    state.areas = await sbQuery('areas', { select: '*', filters: ['planta_id=eq.' + PLANTA_ID], order: 'orden.asc' });
    renderConfiguracion();
    showToast('Orden actualizado', 'success');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

// =====================================================================
// ACTIONS
// =====================================================================
async function toggleRonda(id, abierta) {
  try { await sbUpdate('vacaciones_rondas', id, { abierta: !abierta }); showToast('Ronda ' + (abierta ? 'cerrada' : 'abierta'), 'success'); renderVacaciones(); }
  catch (e) { showToast('Error', 'error'); }
}
async function aprobarSolicitud(id) {
  try {
    var sols = await sbQuery('vacaciones_solicitudes', { select: '*', filters: ['id=eq.' + id] });
    if (!sols || sols.length === 0) { showToast('No encontrada', 'error'); return; }
    var sol = sols[0];

    // Crear turnos V para cada día de las vacaciones
    var d = new Date(sol.fecha_inicio + 'T12:00:00');
    var fin = new Date(sol.fecha_fin + 'T12:00:00');
    while (d <= fin) {
      var ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      try {
        var existente = await sbQuery('turnos', { select: '*', filters: ['empleado_id=eq.' + sol.empleado_id, 'fecha=eq.' + ds] });
        if (existente && existente.length > 0) {
          await sbUpdate('turnos', existente[0].id, { tipo: 'V', editado_manualmente: true, notas: 'Vacaciones aprobadas' });
        } else {
          await sbInsert('turnos', { empleado_id: sol.empleado_id, fecha: ds, tipo: 'V', editado_manualmente: true, notas: 'Vacaciones aprobadas' });
        }
      } catch(e2) { console.error('Error turno V:', ds, e2); }
      d.setDate(d.getDate() + 1);
    }

    await sbUpdate('vacaciones_solicitudes', id, { estado: 'aprobada' });

    // Recargar turnos editados
    try { state.turnosEditados = await sbQuery('turnos', { select: '*', filters: ['editado_manualmente=eq.true'] }); } catch(e3) {}

    showToast('Aprobada y reflejada en calendario', 'success');
    renderVacaciones();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}
async function rechazarSolicitud(id) {
  try { await sbUpdate('vacaciones_solicitudes', id, { estado: 'rechazada' }); showToast('Rechazada'); renderVacaciones(); }
  catch (e) { showToast('Error', 'error'); }
}

// =====================================================================
// NOTIFICATIONS
// =====================================================================
function updateNotifBadge() {
  const unread = state.notificaciones.filter(n => !n.leida).length;
  document.getElementById('notif-dot').style.display = unread > 0 ? 'block' : 'none';
}

function toggleNotifs() {
  const dd = document.getElementById('notif-dropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
  if (dd.style.display === 'block') {
    if (state.notificaciones.length === 0) {
      document.getElementById('notif-list').innerHTML = '<div class="notif-empty">Sin notificaciones</div>';
    } else {
      document.getElementById('notif-list').innerHTML = state.notificaciones.slice(0, 8).map(n =>
        '<div class="notif-item' + (n.leida ? '' : ' unread') + '"><div class="notif-text"><strong>' + n.titulo + '</strong><br>' + n.mensaje + '</div></div>'
      ).join('');
    }
  }
}

function markAllRead() {
  state.notificaciones.forEach(n => n.leida = true);
  updateNotifBadge();
  toggleNotifs();
}

// =====================================================================
// SIDEBAR MOBILE
// =====================================================================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobile-overlay').classList.toggle('show');
}

function togglePass(inputId, btn) {
  var inp = document.getElementById(inputId);
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  } else {
    inp.type = 'password';
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }
}

function modalCrearPassword() {
  var body = '<div class="alert alert-info" style="margin-bottom:16px"><span>Es tu primer acceso. Crea una contraseña para proteger tu cuenta.</span></div>';
  body += '<div class="form-group"><label class="form-label">Nueva contraseña</label>';
  body += '<div class="pass-wrap"><input type="password" class="form-input" id="cp-pass1" placeholder="Mínimo 4 caracteres">';
  body += '<button type="button" class="pass-toggle" onclick="togglePass(\'cp-pass1\',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>';
  body += '<div class="form-group"><label class="form-label">Repetir contraseña</label>';
  body += '<div class="pass-wrap"><input type="password" class="form-input" id="cp-pass2" placeholder="Repite la contraseña">';
  body += '<button type="button" class="pass-toggle" onclick="togglePass(\'cp-pass2\',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>';
  // No cerrable — debe crear contraseña
  var existing = document.getElementById('global-modal');
  if (existing) existing.remove();
  var m = document.createElement('div');
  m.className = 'modal-overlay';
  m.id = 'global-modal';
  m.innerHTML = '<div class="modal" onclick="event.stopPropagation()">' +
    '<div class="modal-header"><span class="modal-title">Crear contraseña</span></div>' +
    '<div class="modal-body">' + body + '</div>' +
    '<div class="modal-footer"><button class="btn btn-blue" onclick="guardarNuevaPassword()">Guardar contraseña</button></div></div>';
  document.body.appendChild(m);
}

async function guardarNuevaPassword() {
  var p1 = document.getElementById('cp-pass1').value;
  var p2 = document.getElementById('cp-pass2').value;
  if (!p1 || p1.length < 4) { showToast('Mínimo 4 caracteres', 'error'); return; }
  if (p1 !== p2) { showToast('Las contraseñas no coinciden', 'error'); return; }
  try {
    await sbUpdate('empleados', state.user.id, { password_hash: p1, primer_login: false });
    state.user.primerLogin = false;
    if (state.user.empleadoData) state.user.empleadoData.password_hash = p1;
    closeModal();
    showToast('Contraseña creada correctamente', 'success');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function modalCambiarPassword() {
  var body = '<div class="form-group"><label class="form-label">Contraseña actual</label>';
  body += '<div class="pass-wrap"><input type="password" class="form-input" id="chp-actual">';
  body += '<button type="button" class="pass-toggle" onclick="togglePass(\'chp-actual\',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>';
  body += '<div class="form-group"><label class="form-label">Nueva contraseña</label>';
  body += '<div class="pass-wrap"><input type="password" class="form-input" id="chp-nueva">';
  body += '<button type="button" class="pass-toggle" onclick="togglePass(\'chp-nueva\',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>';
  body += '<div class="form-group"><label class="form-label">Repetir nueva contraseña</label>';
  body += '<div class="pass-wrap"><input type="password" class="form-input" id="chp-nueva2">';
  body += '<button type="button" class="pass-toggle" onclick="togglePass(\'chp-nueva2\',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>';
  openModal('Cambiar contraseña', body,
    '<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>' +
    '<button class="btn btn-blue" onclick="guardarCambioPassword()">Guardar</button>');
}

async function guardarCambioPassword() {
  var actual = document.getElementById('chp-actual').value;
  var nueva = document.getElementById('chp-nueva').value;
  var nueva2 = document.getElementById('chp-nueva2').value;
  if (!actual) { showToast('Introduce tu contraseña actual', 'error'); return; }
  if (!nueva || nueva.length < 4) { showToast('Mínimo 4 caracteres', 'error'); return; }
  if (nueva !== nueva2) { showToast('Las contraseñas no coinciden', 'error'); return; }
  var emp = state.user.empleadoData;
  if (emp && emp.password_hash !== actual) { showToast('Contraseña actual incorrecta', 'error'); return; }
  try {
    await sbUpdate('empleados', state.user.id, { password_hash: nueva });
    if (state.user.empleadoData) state.user.empleadoData.password_hash = nueva;
    closeModal();
    showToast('Contraseña cambiada', 'success');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('show');
}

// Close notification dropdown on outside click
document.addEventListener('click', e => {
  const dd = document.getElementById('notif-dropdown');
  const btn = document.getElementById('notif-btn');
  if (dd && btn && !btn.contains(e.target) && !dd.contains(e.target)) {
    dd.style.display = 'none';
  }
});
</script>
